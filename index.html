<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Investment Calculator</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />

  <style>
    body {
    background-color: #eaecef;
    }

    main.container {
    max-width: 1500px;
    }

    .app-wrapper {
    min-height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 4rem;
    }

    .calculator-card {
    width: 100%;
    max-width: 620px;
    transition: transform 0.55s ease;
    z-index: 2;
    }

    .results-card {
    position: absolute;
    top: 4rem;
    left: 50%;

    width: 100%;
    max-width: 720px;

    opacity: 0;
    visibility: hidden;
    pointer-events: none;

    transform: translateX(80px);

    transition:
        opacity 0.45s ease,
        transform 0.55s ease,
        visibility 0.45s ease;
    }

    .app-wrapper.has-results .calculator-card {
    transform: translateX(-380px);
    }

    .app-wrapper.has-results .results-card {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateX(-20px);
    }

    .monthly-table-wrapper {
    max-height: 360px;
    overflow-y: auto;
    }

    @media (max-width: 1200px) {
    .app-wrapper.has-results .calculator-card {
        transform: translateX(-300px);
    }

    .app-wrapper.has-results .results-card {
        transform: translateX(-10px);
        max-width: 600px;
    }
    }

    @media (max-width: 992px) {
    .app-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding-top: 2rem;
    }

    .calculator-card {
        max-width: 720px;
    }

    .results-card {
        position: static;
        max-width: 720px;
        transform: translateY(32px);
        max-height: 0;
        overflow: hidden;
    }

    .app-wrapper.has-results .calculator-card {
        transform: translateY(0);
    }

    .app-wrapper.has-results .results-card {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateY(0);
        max-height: 1200px;
    }
    }
  </style>
</head>

<body>
  <main class="container py-5">
    <div id="app-wrapper" class="app-wrapper">
      
      <section class="card shadow p-3 calculator-card">
        <div class="card-body">
          <h1 class="card-title text-center mb-2">Investment Calculator</h1>
          <p class="text-muted text-center mb-4">
            Insert the values below to estimate your investment growth.
          </p>

          <form id="investment-form" novalidate>
            <div class="form-floating mb-3">
              <input
                type="number"
                name="initialAmount"
                id="initial-amount"
                class="form-control"
                placeholder="Initial amount"
                min="0"
                step="0.01"
              />
              <label for="initial-amount">Initial amount</label>
            </div>

            <div class="form-floating mb-3">
              <input
                type="number"
                name="monthlyContribution"
                id="monthly-contribution"
                class="form-control"
                placeholder="Monthly contribution"
                min="0"
                step="0.01"
              />
              <label for="monthly-contribution">Monthly contribution</label>
            </div>

            <div class="row mb-3 align-items-end">
                <div class="col-md-6">
                    <label for="monthly-rate" class="form-label">Monthly return rate</label>
                    <div class="input-group">
                        <input type="number" name="monthlyRate" id="monthly-rate" class="form-control" placeholder="Example: 1" min="0" step="0.01" />
                        <span class="input-group-text">%</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="selectCurrencyFormat" class="form-label">Currency format</label>
                    <div class="input-group">
                        <select class="form-select border-primary-subtle form-control" id="selectCurrencyFormat">
                            <option value="USD" selected>Dollar</option>
                            <option value="BRL">BRL</option>
                            <option value="EUR">Euro</option>
                        </select>
                    </div>
                </div>
            </div>


            <div class="form-floating mb-3">
              <input
                type="number"
                name="months"
                id="months"
                class="form-control"
                placeholder="Period in months"
                min="1"
                step="1"
              />
              <label for="months">Period in months</label>
            </div>

            <div id="errors-container"></div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary w-100 shadow-sm">
                Evaluate
              </button>

              <button type="reset" id="clear-button" class="btn btn-outline-secondary w-100">
                Clear
              </button>
            </div>
          </form>
        </div>
      </section>

      <section id="results-section" class="card shadow p-3 results-card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Investment Summary</h2>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="border rounded p-3 h-100">
                <p class="text-muted mb-1">Total invested</p>
                <strong id="total-invested">R$ 0,00</strong>
              </div>
            </div>

            <div class="col-md-4">
              <div class="border rounded p-3 h-100">
                <p class="text-muted mb-1">Accumulated interest</p>
                <strong id="total-interest">R$ 0,00</strong>
              </div>
            </div>

            <div class="col-md-4">
              <div class="border rounded p-3 h-100">
                <p class="text-muted mb-1">Final amount</p>
                <strong id="final-amount">R$ 0,00</strong>
              </div>
            </div>
          </div>

          <h3 class="h5 mb-3">Monthly evolution</h3>

          <div class="monthly-table-wrapper">
            <table class="table table-striped table-hover align-middle">
              <thead>
                <tr>
                  <th scope="col">Month</th>
                  <th scope="col">Invested</th>
                  <th scope="col">Interest</th>
                  <th scope="col">Balance</th>
                </tr>
              </thead>

              <tbody id="monthly-results-body"></tbody>
            </table>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
